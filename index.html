<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Validator with QR Code</title>

  <!-- =============================================================
       EXTERNAL LIBRARIES
       - html5-qrcode: camera access + QR decoding cross-browser
       - PapaParse: parses Google Sheet CSV reliably
       ============================================================= -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =============================================================
       DESIGN TOKENS
       ============================================================= */
    :root {
      --bg: #ffffff;
      --bg-soft: #f7fafc;
      --ink: #0f172a;
      --ink-soft: #475569;
      --ink-muted: #94a3b8;
      --line: #e2e8f0;

      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-border: #93c5fd;

      --success: #047857;
      --success-soft: #d1fae5;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --warn: #b45309;
      --warn-soft: #fef3c7;

      --radius: 14px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 20px -8px rgba(15, 23, 42, 0.12);

      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 20% 0%, rgba(37, 99, 235, 0.04), transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(37, 99, 235, 0.03), transparent 40%);
    }

    /* =============================================================
       LAYOUT
       ============================================================= */
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    @media (max-width: 600px) {
      .page { padding: 28px 16px 60px; }
    }

    /* =============================================================
       HEADER
       ============================================================= */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .header__eyebrow::before {
      content: "";
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }
    .header h1 {
      font-size: clamp(28px, 4.5vw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      line-height: 1.1;
    }
    .header p {
      color: var(--ink-soft);
      font-size: 16px;
      margin: 0;
    }

    /* =============================================================
       CARD
       ============================================================= */
    .card {
      background: #fff;
      border: 2px solid var(--accent-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--accent-border);
      flex-wrap: wrap;
    }
    .card__title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      color: var(--ink);
    }
    .card__title svg { color: var(--accent); }
    .card__body { padding: 24px; }
    @media (max-width: 600px) {
      .card__body { padding: 16px; }
    }

    /* =============================================================
       CONTROLS
       ============================================================= */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      .controls { grid-template-columns: 1fr; }
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field__label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }
    select, button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s ease;
      height: 42px;
    }
    select:hover, button:hover { border-color: var(--ink-muted); }
    select:focus, button:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
    .btn-danger {
      background: #fff;
      color: var(--danger);
      border-color: var(--line);
    }
    .btn-danger:hover:not(:disabled) {
      background: var(--danger-soft);
      border-color: var(--danger);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 4px;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink-soft);
      font-weight: 500;
      user-select: none;
      cursor: pointer;
    }
    .toggle input { accent-color: var(--accent); }

    /* =============================================================
       CAMERA / READER AREA
       The html5-qrcode library renders:
         #reader
           └── #reader__scan_region    (contains the <video>)
                 └── #qr-shaded-region (the OUTER overlay frame with cut-out box)
                       └── 4× absolutely-positioned corner-marker divs
       We style #qr-shaded-region directly so the corner markers
       go white (scanning) → green (found) → red (not found).
       NOTE: there is NO custom inner reticle. This is the only frame.
       ============================================================= */
    .reader-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      background: #0f172a;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px dashed var(--line);
    }

    #reader {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background: transparent;
    }
    #reader > div { width: 100% !important; height: 100% !important; }

    /* Hide all the library's default chrome we don't want */
    #reader__dashboard_section_csr,
    #reader__dashboard_section_swaplink,
    #reader__status_span,
    #reader__header_message,
    #reader__scan_region img {
      display: none !important;
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }
    #reader__scan_region {
      background: transparent !important;
      min-height: 100% !important;
    }

    /* ---------- THE OUTER SCAN FRAME ----------
       The library renders its corner markers as four <div>s inside
       #qr-shaded-region. Their default colour is green/lime. We override
       to white by default and switch to green/red based on data-status
       on the reader-wrap. */
    #reader__scan_region #qr-shaded-region > div {
      background: #ffffff !important;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }
    .reader-wrap[data-status="success"] #reader__scan_region #qr-shaded-region > div {
      background: #22c55e !important;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }
    .reader-wrap[data-status="error"] #reader__scan_region #qr-shaded-region > div {
      background: #ef4444 !important;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.9);
    }

    /* Empty state when camera is off */
    .reader-empty {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
    .reader-empty svg {
      width: 48px; height: 48px;
      opacity: 0.5;
    }

    /* Status pill (top-right of camera frame) */
    .status-pill {
      position: absolute;
      top: 12px; right: 12px;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(15, 23, 42, 0.85);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .status-pill.active { display: inline-flex; }
    .status-pill__dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    /* Full-frame flash on success/error */
    .frame-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 4;
      border-radius: var(--radius-sm);
    }
    .frame-flash.flash--success {
      background: radial-gradient(circle at center, rgba(34, 197, 94, 0.35), rgba(34, 197, 94, 0.05));
      box-shadow: inset 0 0 0 4px #22c55e, inset 0 0 40px rgba(34, 197, 94, 0.4);
      animation: flashFade 1.2s ease-out forwards;
    }
    .frame-flash.flash--error {
      background: radial-gradient(circle at center, rgba(239, 68, 68, 0.35), rgba(239, 68, 68, 0.05));
      box-shadow: inset 0 0 0 4px #ef4444, inset 0 0 40px rgba(239, 68, 68, 0.4);
      animation: flashFade 1.2s ease-out forwards;
    }
    @keyframes flashFade {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* =============================================================
       RESULT MESSAGES + TABLE
       ============================================================= */
    .result-area { margin-top: 24px; }
    .message {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .message--info {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent-border);
    }
    .message--success {
      background: var(--success-soft);
      color: var(--success);
      border: 1px solid #6ee7b7;
    }
    .message--error {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #fca5a5;
    }
    .message--warn {
      background: var(--warn-soft);
      color: var(--warn);
      border: 1px solid #fcd34d;
    }
    .scanned-value {
      font-family: var(--font-mono);
      font-size: 13px;
      background: rgba(15, 23, 42, 0.06);
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 6px;
      word-break: break-all;
    }
    .result-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
    }
    table.result {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    table.result th {
      text-align: left;
      background: var(--bg-soft);
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    table.result td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      vertical-align: top;
    }
    table.result tr:last-child td { border-bottom: none; }
    table.result td.field-name {
      font-weight: 600;
      color: var(--ink-soft);
      width: 35%;
      background: rgba(247, 250, 252, 0.6);
    }
    table.result td.field-value {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* =============================================================
       DEBUG / SETUP NOTES
       ============================================================= */
    .setup-note {
      margin-top: 24px;
      padding: 16px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.6;
    }
    .setup-note summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--ink);
    }

    .config-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-muted);
      flex-wrap: wrap;
    }
    .config-bar__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ink-muted);
    }
    .config-bar__dot.ok { background: #22c55e; }
    .config-bar__dot.err { background: #ef4444; }
  </style>
</head>
<body>

  <main class="page">

    <header class="header">
      <span class="header__eyebrow">TEDxIIHMRU</span>
      <h1>Data Validator with QR Code</h1>
      <p>Made by IIHMR Startups</p>
    </header>

    <section class="card" aria-label="Code Scanner">
      <div class="card__header">
        <div class="card__title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <path d="M14 14h3v3h-3zM20 14v3M14 20h3v1h-3zM20 20v1"/>
          </svg>
          Code Scanner
        </div>
        <div class="config-bar" id="sheetStatus" title="Data source status">
          <span class="config-bar__dot" id="sheetDot"></span>
          <span id="sheetStatusText">Connecting to data source…</span>
        </div>
      </div>

      <div class="card__body">

        <div class="controls">
          <div class="field">
            <label class="field__label" for="cameraSelect">Select Camera</label>
            <select id="cameraSelect">
              <option value="">— No cameras detected —</option>
            </select>
          </div>
          <div class="field">
            <label class="field__label">&nbsp;</label>
            <button id="startBtn" class="btn-primary">▶  Start Scanning</button>
          </div>
          <div class="field">
            <label class="field__label">&nbsp;</label>
            <button id="stopBtn" class="btn-danger" disabled>■  Stop Scanning</button>
          </div>
        </div>

        <div class="toggles">
          <label class="toggle">
            <input type="checkbox" id="continuousToggle" />
            Continuous scanning (don't auto-stop after a match)
          </label>
          <label class="toggle">
            <input type="checkbox" id="soundToggle" checked />
            Sound feedback
          </label>
        </div>

        <!-- Camera reader -->
        <div class="reader-wrap" id="readerWrap" style="margin-top: 18px;">
          <div id="reader"></div>

          <div class="reader-empty" id="readerEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <div>Camera is off. Click <strong>Start Scanning</strong> to begin.</div>
          </div>

          <div class="status-pill" id="statusPill">
            <span class="status-pill__dot"></span>
            <span>Scanning</span>
          </div>

          <!-- Frame flash overlay (green on match, red on no-match) -->
          <div class="frame-flash" id="frameFlash"></div>
        </div>

        <!-- Result messages + matched-record table -->
        <div class="result-area" id="resultArea" aria-live="polite"></div>

        <details class="setup-note" id="debugPanel">
          <summary>🔍 Debug log (sheet connection)</summary>
          <pre id="debugLog" style="margin:10px 0 0;padding:12px;background:#0f172a;color:#a7f3d0;border-radius:6px;font-family:var(--font-mono);font-size:11px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:280px;overflow-y:auto;"></pre>
        </details>
      </div>
    </section>
  </main>

  <script>
  // ===============================================================
  // CONFIGURATION
  // ===============================================================
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRWovc_6HzdQGtVFwCeJAXlvPtfiyx0sZN3IRzch5rbXJ-dP1d2QnuFNDd1UMfqiCD_qzALmNW9Bxms/pub?gid=0&single=true&output=csv";
  const SERIAL_COLUMN = "Serial No.";

  const DEMO_DATA = [
    { "Serial No.": "SN-1001", "Name": "Aarav Sharma",   "DataD": "Batch A", "DataF": "2026-03-12", "DataG": "Verified" },
    { "Serial No.": "SN-1002", "Name": "Priya Verma",    "DataD": "Batch A", "DataF": "2026-03-12", "DataG": "Verified" },
    { "Serial No.": "SN-1003", "Name": "Rohan Iyer",     "DataD": "Batch B", "DataF": "2026-04-05", "DataG": "Pending"  },
    { "Serial No.": "SN-1004", "Name": "Meera Patel",    "DataD": "Batch B", "DataF": "2026-04-05", "DataG": "Verified" },
    { "Serial No.": "SN-1005", "Name": "Kabir Nair",     "DataD": "Batch C", "DataF": "2026-05-18", "DataG": "Flagged"  }
  ];

  // ===============================================================
  // STATE
  // ===============================================================
  let sheetData = [];
  let sheetColumns = [];
  let html5QrCode = null;
  let isScanning = false;
  let usingDemoData = false;

  // ===============================================================
  // DOM REFERENCES
  // ===============================================================
  const els = {
    cameraSelect:    document.getElementById('cameraSelect'),
    startBtn:        document.getElementById('startBtn'),
    stopBtn:         document.getElementById('stopBtn'),
    continuousTgl:   document.getElementById('continuousToggle'),
    soundTgl:        document.getElementById('soundToggle'),
    reader:          document.getElementById('reader'),
    readerWrap:      document.getElementById('readerWrap'),
    readerEmpty:     document.getElementById('readerEmpty'),
    statusPill:      document.getElementById('statusPill'),
    frameFlash:      document.getElementById('frameFlash'),
    resultArea:      document.getElementById('resultArea'),
    sheetDot:        document.getElementById('sheetDot'),
    sheetStatusText: document.getElementById('sheetStatusText'),
  };

  function setResultHTML(html) {
    if (els.resultArea) els.resultArea.innerHTML = html;
  }

  // ===============================================================
  // FRAME STATE — controls the colour of the outer scan frame.
  // We set data-status on .reader-wrap; CSS does the rest.
  //   ''        → white (default while scanning)
  //   'success' → green
  //   'error'   → red
  // ===============================================================
  function setFrameStatus(status) {
    if (!els.readerWrap) return;
    if (status) {
      els.readerWrap.setAttribute('data-status', status);
    } else {
      els.readerWrap.removeAttribute('data-status');
    }
  }

  function flashFrame(kind) {
    // 1) Persistent corner colour change
    setFrameStatus(kind);

    // 2) Full-frame flash animation
    if (els.frameFlash) {
      els.frameFlash.classList.remove('flash--success', 'flash--error');
      void els.frameFlash.offsetWidth;  // force reflow so animation restarts
      els.frameFlash.classList.add('flash--' + kind);
    }

    // 3) Reset to white after a moment (continuous mode benefit)
    clearTimeout(flashFrame._t);
    flashFrame._t = setTimeout(() => {
      setFrameStatus('');
      if (els.frameFlash) els.frameFlash.classList.remove('flash--success', 'flash--error');
    }, 1300);
  }

  // ===============================================================
  // AUDIO FEEDBACK (Web Audio API — no audio files needed)
  // ===============================================================
  let _audioCtx = null;
  function getAudioContext() {
    if (!_audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      _audioCtx = new Ctx();
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});
    return _audioCtx;
  }

  function playTone(frequency, durationMs, startOffsetMs = 0, volume = 0.18, type = 'sine') {
    const ctx = getAudioContext();
    if (!ctx) return;
    const start = ctx.currentTime + startOffsetMs / 1000;
    const dur = durationMs / 1000;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, start);

    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(volume, start + 0.015);
    gain.gain.setValueAtTime(volume, start + Math.max(0, dur - 0.06));
    gain.gain.linearRampToValueAtTime(0, start + dur);

    osc.connect(gain).connect(ctx.destination);
    osc.start(start);
    osc.stop(start + dur + 0.02);
  }

  function playFeedbackSound(kind) {
    if (els.soundTgl && !els.soundTgl.checked) return;
    if (kind === 'success') {
      // Pleasant rising chime A5 → E6
      playTone(880, 120, 0);
      playTone(1318.5, 180, 110);
    } else {
      // Lower buzzy "wrong" sound
      playTone(220, 160, 0,   0.20, 'square');
      playTone(165, 240, 150, 0.20, 'square');
    }
  }

  // ===============================================================
  // 1. LOAD GOOGLE SHEET DATA
  // ===============================================================
  async function loadSheetData() {
    setSheetStatus('loading', 'Connecting to data source…');
    debugLog('Fetching: ' + SHEET_CSV_URL);

    try {
      const res = await fetch(SHEET_CSV_URL, { redirect: 'follow' });
      debugLog('HTTP status: ' + res.status + ' ' + res.statusText);
      debugLog('Final URL after redirects: ' + res.url);
      debugLog('Content-Type: ' + (res.headers.get('content-type') || '(none)'));

      if (!res.ok) {
        const body = await res.text();
        debugLog('Body (first 400 chars): ' + body.slice(0, 400));
        throw new Error('HTTP ' + res.status);
      }

      const csvText = await res.text();
      debugLog('Got ' + csvText.length + ' chars of CSV. First 200 chars:');
      debugLog(csvText.slice(0, 200));

      const trimmed = csvText.trimStart().slice(0, 20).toLowerCase();
      if (trimmed.startsWith('<!doctype') || trimmed.startsWith('<html')) {
        debugLog('⚠ Response is HTML, not CSV. The sheet is probably NOT published to web.');
        throw new Error('Sheet is not published as CSV (got HTML back).');
      }

      const results = Papa.parse(csvText, { header: true, skipEmptyLines: true });
      if (results.errors && results.errors.length) {
        debugLog('Papa parse warnings: ' + JSON.stringify(results.errors.slice(0, 3)));
      }
      if (!results.data || results.data.length === 0) {
        useDemoData('Sheet returned no rows. Using demo data.');
        return;
      }

      sheetData = results.data;
      sheetColumns = results.meta.fields || Object.keys(results.data[0]);
      usingDemoData = false;
      setSheetStatus('ok', `Loaded ${sheetData.length} records from sheet`);
      debugLog('✔ Columns detected: ' + sheetColumns.join(', '));

      if (!sheetColumns.includes(SERIAL_COLUMN)) {
        debugLog('⚠ SERIAL_COLUMN "' + SERIAL_COLUMN + '" not found in sheet headers. ' +
                 'Edit SERIAL_COLUMN in the script to match one of: ' + sheetColumns.join(', '));
      }
    } catch (err) {
      console.error('Sheet load error:', err);
      debugLog('✖ Fetch failed: ' + (err && err.message ? err.message : err));
      showRetryableError();
    }
  }

  function useDemoData(msg) {
    sheetData = DEMO_DATA.slice();
    sheetColumns = Object.keys(DEMO_DATA[0]);
    usingDemoData = true;
    setSheetStatus('warn', msg);
  }

  function setSheetStatus(state, text) {
    els.sheetDot.className = 'config-bar__dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    els.sheetStatusText.textContent = text;
  }

  function showRetryableError() {
    setSheetStatus('err', 'Failed to load sheet');
    setResultHTML(`
      <div class="message message--error">
        <span>⚠️</span>
        <span style="flex:1;">Could not load Google Sheet. Check the published URL and your network.</span>
        <button id="retryLoad" class="btn-primary" style="height:32px;padding:4px 12px;font-size:12px;">Retry</button>
      </div>
    `);
    const retryBtn = document.getElementById('retryLoad');
    if (retryBtn) {
      retryBtn.addEventListener('click', () => {
        setResultHTML('');
        loadSheetData();
      });
    }
  }

  // ===============================================================
  // 2. CAMERA ENUMERATION
  // ===============================================================
  async function populateCameras() {
    try {
      const devices = await Html5Qrcode.getCameras();
      els.cameraSelect.innerHTML = '';
      if (!devices || devices.length === 0) {
        els.cameraSelect.innerHTML = '<option value="">— No cameras detected —</option>';
        els.startBtn.disabled = true;
        return;
      }
      devices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.label || `Camera ${i + 1}`;
        els.cameraSelect.appendChild(opt);
      });
      const back = devices.find(d => /back|rear|environment/i.test(d.label));
      if (back) els.cameraSelect.value = back.id;
      els.startBtn.disabled = false;
    } catch (err) {
      console.warn('Camera enumeration failed:', err);
      els.cameraSelect.innerHTML = '<option value="">— Grant camera permission to list —</option>';
    }
  }

  // ===============================================================
  // 3. START / STOP SCANNING
  // ===============================================================
  async function startScanning() {
    if (isScanning) return;
    clearResult();
    setFrameStatus('');  // reset to white

    let cameraId = els.cameraSelect.value;
    if (!cameraId) {
      try {
        await navigator.mediaDevices.getUserMedia({ video: true });
        await populateCameras();
        cameraId = els.cameraSelect.value;
      } catch (err) {
        showPermissionError();
        return;
      }
    }
    if (!cameraId) {
      showPermissionError('No camera available on this device.');
      return;
    }

    html5QrCode = new Html5Qrcode("reader", { verbose: false });

    const config = {
      fps: 10,
      qrbox: (viewfinderWidth, viewfinderHeight) => {
        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        const size = Math.floor(minEdge * 0.7);
        return { width: size, height: size };
      },
      aspectRatio: 1.0,
    };

    try {
      await html5QrCode.start(cameraId, config, onScanSuccess, onScanFailure);
      isScanning = true;
      els.readerEmpty.style.display = 'none';
      els.statusPill.classList.add('active');
      setFrameStatus('');  // ensure white at start
      if (els.frameFlash) els.frameFlash.classList.remove('flash--success', 'flash--error');
      els.startBtn.disabled = true;
      els.stopBtn.disabled = false;
      els.cameraSelect.disabled = true;

      // Wake the audio context so the first scan plays without delay
      getAudioContext();
    } catch (err) {
      console.error('Failed to start scanner:', err);
      showPermissionError(err && err.message ? err.message : 'Could not start the camera.');
    }
  }

  async function stopScanning() {
    if (!isScanning || !html5QrCode) return;
    try {
      await html5QrCode.stop();
      await html5QrCode.clear();
    } catch (err) {
      console.warn('Stop error:', err);
    }
    html5QrCode = null;
    isScanning = false;
    els.readerEmpty.style.display = 'flex';
    els.statusPill.classList.remove('active');
    setFrameStatus('');
    els.startBtn.disabled = false;
    els.stopBtn.disabled = true;
    els.cameraSelect.disabled = false;
  }

  // ===============================================================
  // 4. SCAN CALLBACKS + VALIDATION
  // ===============================================================
  function onScanSuccess(decodedText) {
    const continuous = els.continuousTgl.checked;
    if (!continuous) stopScanning();
    validateAgainstSheet(decodedText.trim());
  }

  function onScanFailure() { /* silent */ }

  function normalize(v) {
    return (v == null ? '' : String(v)).trim().toLowerCase();
  }

  function validateAgainstSheet(scannedValue) {
    if (!sheetData || sheetData.length === 0) {
      renderMessage('error', 'No sheet data loaded yet — cannot validate.');
      return;
    }
    const target = normalize(scannedValue);
    const match = sheetData.find(row => normalize(row[SERIAL_COLUMN]) === target);
    if (match) renderMatch(scannedValue, match);
    else renderNotFound(scannedValue);
  }

  // ===============================================================
  // 5. RESULT RENDERING
  // ===============================================================
  function clearResult() {
    setResultHTML('');
  }

  function renderMessage(kind, text) {
    const icon = { info: 'ℹ️', success: '✅', error: '⛔', warn: '⚠️' }[kind] || '';
    setResultHTML(`
      <div class="message message--${kind}">
        <span>${icon}</span>
        <span>${text}</span>
      </div>
    `);
  }

  function renderMatch(scannedValue, row) {
    flashFrame('success');
    playFeedbackSound('success');

    const rows = sheetColumns.map(col => `
      <tr>
        <td class="field-name">${escapeHtml(col)}</td>
        <td class="field-value">${escapeHtml(row[col] ?? '')}</td>
      </tr>
    `).join('');

    setResultHTML(`
      <div class="message message--success">
        <span>✅</span>
        <span>Record Found <span class="scanned-value">${escapeHtml(scannedValue)}</span></span>
      </div>
      <div class="result-table-wrap">
        <table class="result">
          <thead><tr><th>Field</th><th>Value</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `);
  }

  function renderNotFound(scannedValue) {
    flashFrame('error');
    playFeedbackSound('error');

    setResultHTML(`
      <div class="message message--error">
        <span>⛔</span>
        <span>Record Not Found <span class="scanned-value">${escapeHtml(scannedValue)}</span></span>
      </div>
    `);
  }

  function showPermissionError(msg) {
    const text = msg || 'Camera permission was denied. Please allow camera access in your browser settings and try again.';
    setResultHTML(`
      <div class="message message--error">
        <span>📷</span>
        <span>${escapeHtml(text)}</span>
      </div>
    `);
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function debugLog(msg) {
    const el = document.getElementById('debugLog');
    if (el) {
      const time = new Date().toLocaleTimeString();
      el.textContent += `[${time}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }
    console.log('[DEBUG]', msg);
  }

  // ===============================================================
  // 6. WIRE UP EVENTS + INIT
  // ===============================================================
  els.startBtn.addEventListener('click', startScanning);
  els.stopBtn.addEventListener('click', stopScanning);

  els.cameraSelect.addEventListener('change', async () => {
    if (isScanning) {
      await stopScanning();
      startScanning();
    }
  });

  window.addEventListener('beforeunload', () => {
    if (isScanning && html5QrCode) {
      html5QrCode.stop().catch(() => {});
    }
  });

  loadSheetData();
  populateCameras();
  </script>
</body>
</html>
