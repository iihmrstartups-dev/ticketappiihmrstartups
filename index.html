<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Validator with QR Code</title>

  <!-- =============================================================
       EXTERNAL LIBRARIES
       - html5-qrcode: handles camera access + QR decoding cross-browser
       - PapaParse: parses Google Sheet CSV reliably (handles quoted fields, commas in values, etc.)
       ============================================================= -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Typography: Plus Jakarta Sans for UI, JetBrains Mono for serial numbers / data -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =============================================================
       DESIGN TOKENS
       ============================================================= */
    :root {
      --bg: #ffffff;
      --bg-soft: #f7fafc;
      --ink: #0f172a;
      --ink-soft: #475569;
      --ink-muted: #94a3b8;
      --line: #e2e8f0;

      /* Brand: light blue accent as specified */
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-border: #93c5fd;

      --success: #047857;
      --success-soft: #d1fae5;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --warn: #b45309;
      --warn-soft: #fef3c7;

      --radius: 14px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 20px -8px rgba(15, 23, 42, 0.12);

      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 20% 0%, rgba(37, 99, 235, 0.04), transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(37, 99, 235, 0.03), transparent 40%);
    }

    /* =============================================================
       LAYOUT
       ============================================================= */
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    @media (max-width: 600px) {
      .page { padding: 28px 16px 60px; }
    }

    /* =============================================================
       HEADER
       ============================================================= */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .header__eyebrow::before {
      content: "";
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }
    .header h1 {
      font-size: clamp(28px, 4.5vw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      line-height: 1.1;
    }
    .header p {
      color: var(--ink-soft);
      font-size: 16px;
      margin: 0;
    }

    /* =============================================================
       CARD (Code Scanner panel)
       ============================================================= */
    .card {
      background: #fff;
      border: 2px solid var(--accent-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--accent-border);
    }
    .card__title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      color: var(--ink);
    }
    .card__title svg { color: var(--accent); }
    .card__body {
      padding: 24px;
    }
    @media (max-width: 600px) {
      .card__body { padding: 16px; }
    }

    /* =============================================================
       CONTROLS ROW
       ============================================================= */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      .controls { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field__label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }
    select, button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s ease;
      height: 42px;
    }
    select:hover, button:hover { border-color: var(--ink-muted); }
    select:focus, button:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
    .btn-danger {
      background: #fff;
      color: var(--danger);
      border-color: var(--line);
    }
    .btn-danger:hover:not(:disabled) {
      background: var(--danger-soft);
      border-color: var(--danger);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Toggle for continuous scanning */
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink-soft);
      font-weight: 500;
      margin-top: 4px;
      user-select: none;
      cursor: pointer;
    }
    .toggle input { accent-color: var(--accent); }

    /* =============================================================
       CAMERA / READER AREA
       ============================================================= */
    .reader-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      background: #0f172a;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px dashed var(--line);
    }

    #reader {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;            /* sit above the empty-state overlay */
      background: transparent;
    }

    /* Library wrapper divs — force them to fill the box too */
    #reader > div { width: 100% !important; height: 100% !important; }

    /* Hide the library's default UI we don't want */
    #reader__dashboard_section_csr,
    #reader__dashboard_section_swaplink,
    #reader__status_span,
    #reader__header_message,
    #reader__scan_region img {
      display: none !important;
    }

    /* Ensure the video fills the box */
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }
    #reader__scan_region {
      background: transparent !important;
      min-height: 100% !important;
    }

    /* Empty state shown when camera is off */
    .reader-empty {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
    .reader-empty svg {
      width: 48px; height: 48px;
      opacity: 0.5;
    }

    /* Scanning reticle overlay with corner markers */
    .reticle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      aspect-ratio: 1 / 1;
      pointer-events: none;
      display: none;
      z-index: 3;
    }
    .reticle.active { display: block; }
    .reticle__corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: #fff;
      border-style: solid;
      border-width: 0;
    }
    .reticle__corner--tl { top: 0; left: 0; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 6px; }
    .reticle__corner--tr { top: 0; right: 0; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 6px; }
    .reticle__corner--bl { bottom: 0; left: 0; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 6px; }
    .reticle__corner--br { bottom: 0; right: 0; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 6px; }
    .reticle__scanline {
      position: absolute;
      left: 8%; right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 12px var(--accent);
      top: 0;
      animation: scan 2.4s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { top: 8%; opacity: 0.4; }
      50%  { top: 92%; opacity: 1; }
      100% { top: 8%; opacity: 0.4; }
    }

    /* Status pill (top-right of camera frame) */
    .status-pill {
      position: absolute;
      top: 12px; right: 12px;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(15, 23, 42, 0.85);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .status-pill.active { display: inline-flex; }
    .status-pill__dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    /* =============================================================
       RESULT MESSAGES + TABLE
       ============================================================= */
    .result-area {
      margin-top: 24px;
    }
    .message {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .message--info {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent-border);
    }
    .message--success {
      background: var(--success-soft);
      color: var(--success);
      border: 1px solid #6ee7b7;
    }
    .message--error {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #fca5a5;
    }
    .message--warn {
      background: var(--warn-soft);
      color: var(--warn);
      border: 1px solid #fcd34d;
    }

    .scanned-value {
      font-family: var(--font-mono);
      font-size: 13px;
      background: rgba(15, 23, 42, 0.06);
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .result-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
    }
    table.result {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    table.result th {
      text-align: left;
      background: var(--bg-soft);
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    table.result td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      vertical-align: top;
    }
    table.result tr:last-child td { border-bottom: none; }
    table.result td.field-name {
      font-weight: 600;
      color: var(--ink-soft);
      width: 35%;
      background: rgba(247, 250, 252, 0.6);
    }
    table.result td.field-value {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* =============================================================
       SETUP / FOOTER NOTES
       ============================================================= */
    .setup-note {
      margin-top: 24px;
      padding: 16px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.6;
    }
    .setup-note summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--ink);
    }
    .setup-note ol { padding-left: 20px; margin: 12px 0 0; }
    .setup-note li { margin-bottom: 6px; }
    .setup-note code {
      font-family: var(--font-mono);
      background: #fff;
      border: 1px solid var(--line);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .config-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .config-bar__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ink-muted);
    }
    .config-bar__dot.ok { background: #22c55e; }
    .config-bar__dot.err { background: #ef4444; }
  </style>
</head>
<body>

  <main class="page">

    <!-- =========================================================
         HEADER
         ========================================================= -->
    <header class="header">
      <span class="header__eyebrow">TEDxIIHMRU</span>
      <h1>Data Validator with QR Code</h1>
      <p>Made by IIHMR Startups</p>
    </header>

    <!-- =========================================================
         CODE SCANNER CARD
         ========================================================= -->
    <section class="card" aria-label="Code Scanner">
      <div class="card__header">
        <div class="card__title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <path d="M14 14h3v3h-3zM20 14v3M14 20h3v1h-3zM20 20v1"/>
          </svg>
          Code Scanner
        </div>
        <div class="config-bar" id="sheetStatus" title="Data source status">
          <span class="config-bar__dot" id="sheetDot"></span>
          <span id="sheetStatusText">Connecting to data source…</span>
        </div>
      </div>

      <div class="card__body">

        <!-- Controls: camera select + start/stop -->
        <div class="controls">
          <div class="field">
            <label class="field__label" for="cameraSelect">Select Camera</label>
            <select id="cameraSelect">
              <option value="">— No cameras detected —</option>
            </select>
          </div>
          <div class="field">
            <label class="field__label">&nbsp;</label>
            <button id="startBtn" class="btn-primary">▶  Start Scanning</button>
          </div>
          <div class="field">
            <label class="field__label">&nbsp;</label>
            <button id="stopBtn" class="btn-danger" disabled>■  Stop Scanning</button>
          </div>
        </div>

        <label class="toggle">
          <input type="checkbox" id="continuousToggle" />
          Continuous scanning (don't auto-stop after a match)
        </label>

        <!-- Camera reader -->
        <div class="reader-wrap" style="margin-top: 18px;">
          <div id="reader"></div>

          <!-- Empty-state placeholder when off -->
          <div class="reader-empty" id="readerEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <div>Camera is off. Click <strong>Start Scanning</strong> to begin.</div>
          </div>

          <!-- Reticle overlay -->
          <div class="reticle" id="reticle">
            <span class="reticle__corner reticle__corner--tl"></span>
            <span class="reticle__corner reticle__corner--tr"></span>
            <span class="reticle__corner reticle__corner--bl"></span>
            <span class="reticle__corner reticle__corner--br"></span>
            <span class="reticle__scanline"></span>
          </div>

          <!-- Top-right status pill -->
          <div class="status-pill" id="statusPill">
            <span class="status-pill__dot"></span>
            <span>Scanning</span>
          </div>
        </div>

     
        <!-- Debug panel: shows exactly what happens during the sheet fetch -->
        <details class="setup-note" id="debugPanel" open>
          <summary>🔍 Debug log (sheet connection)</summary>
          <pre id="debugLog" style="margin:10px 0 0;padding:12px;background:#0f172a;color:#a7f3d0;border-radius:6px;font-family:var(--font-mono);font-size:11px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:280px;overflow-y:auto;"></pre>
        </details>
      </div>
    </section>
  </main>

  <!-- =============================================================
       SCRIPT
       ============================================================= -->
  <script>
  // ===============================================================
  // CONFIGURATION — edit these two constants to connect your sheet
  // ===============================================================

  // 1) Paste the "Publish to web" CSV URL of your Google Sheet here.
  //    File → Share → Publish to web → CSV format → Publish → copy link.
  //    Leave the demo URL in place to try the app with sample data.
  // NOTE: a valid published-CSV URL ALWAYS contains "2PACX-1v" with a hyphen.
  // If your URL has "2PACX1v" (no hyphen) it was mistyped — re-copy it from Google.
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRWovc_6HzdQGtVFwCeJAXlvPtfiyx0sZN3IRzch5rbXJ-dP1d2QnuFNDd1UMfqiCD_qzALmNW9Bxms/pub?gid=0&single=true&output=csv";

  // 2) The header name of the column that holds serial numbers
  //    (must match the spelling/case in row 1 of your sheet exactly).
  const SERIAL_COLUMN = "Serial No.";

  // 3) Optional: fallback demo data used when SHEET_CSV_URL is not configured
  //    or fails to load. Remove or replace as you wish.
  const DEMO_DATA = [
    { "Serial No.": "SN-1001", "Name": "Aarav Sharma",   "DataD": "Batch A", "DataF": "2026-03-12", "DataG": "Verified" },
    { "Serial No.": "SN-1002", "Name": "Priya Verma",    "DataD": "Batch A", "DataF": "2026-03-12", "DataG": "Verified" },
    { "Serial No.": "SN-1003", "Name": "Rohan Iyer",     "DataD": "Batch B", "DataF": "2026-04-05", "DataG": "Pending"  },
    { "Serial No.": "SN-1004", "Name": "Meera Patel",    "DataD": "Batch B", "DataF": "2026-04-05", "DataG": "Verified" },
    { "Serial No.": "SN-1005", "Name": "Kabir Nair",     "DataD": "Batch C", "DataF": "2026-05-18", "DataG": "Flagged"  }
  ];

  // ===============================================================
  // STATE
  // ===============================================================
  let sheetData = [];          // Array of row objects from the sheet
  let sheetColumns = [];       // Array of column header names, in order
  let html5QrCode = null;      // html5-qrcode instance
  let isScanning = false;
  let usingDemoData = false;

  // ===============================================================
  // DOM REFERENCES
  // ===============================================================
  const els = {
    cameraSelect:    document.getElementById('cameraSelect'),
    startBtn:        document.getElementById('startBtn'),
    stopBtn:         document.getElementById('stopBtn'),
    continuousTgl:   document.getElementById('continuousToggle'),
    reader:          document.getElementById('reader'),
    readerEmpty:     document.getElementById('readerEmpty'),
    reticle:         document.getElementById('reticle'),
    statusPill:      document.getElementById('statusPill'),
    resultArea:      document.getElementById('resultArea'),
    sheetDot:        document.getElementById('sheetDot'),
    sheetStatusText: document.getElementById('sheetStatusText'),
  };

  // ===============================================================
  // 1. LOAD GOOGLE SHEET DATA
  // ===============================================================
  async function loadSheetData() {
    setSheetStatus('loading', 'Connecting to data source…');
    debugLog('Fetching: ' + SHEET_CSV_URL);

    // If user hasn't replaced the demo URL, skip the fetch and use demo data
    if (SHEET_CSV_URL.includes('DEMO_REPLACE_ME')) {
      useDemoData('Using built-in demo data (configure SHEET_CSV_URL to use your sheet).');
      return;
    }

    // We fetch manually (instead of letting Papa download) so we can see the real HTTP status
    // and the first bytes of the response when something goes wrong.
    try {
      const res = await fetch(SHEET_CSV_URL, { redirect: 'follow' });
      debugLog('HTTP status: ' + res.status + ' ' + res.statusText);
      debugLog('Final URL after redirects: ' + res.url);
      debugLog('Content-Type: ' + (res.headers.get('content-type') || '(none)'));

      if (!res.ok) {
        debugLog('Response not OK. Body preview follows.');
        const body = await res.text();
        debugLog('Body (first 400 chars): ' + body.slice(0, 400));
        throw new Error('HTTP ' + res.status);
      }

      const csvText = await res.text();
      debugLog('Got ' + csvText.length + ' chars of CSV. First 200 chars:');
      debugLog(csvText.slice(0, 200));

      // If the response is HTML instead of CSV, Google is serving an error/login page.
      // That typically means the sheet isn't actually published — only shared.
      const trimmed = csvText.trimStart().slice(0, 20).toLowerCase();
      if (trimmed.startsWith('<!doctype') || trimmed.startsWith('<html')) {
        debugLog('⚠ Response is HTML, not CSV. The sheet is probably NOT published to web.');
        throw new Error('Sheet is not published as CSV (got HTML back).');
      }

      const results = Papa.parse(csvText, { header: true, skipEmptyLines: true });

      if (results.errors && results.errors.length) {
        debugLog('Papa parse warnings: ' + JSON.stringify(results.errors.slice(0, 3)));
      }
      if (!results.data || results.data.length === 0) {
        useDemoData('Sheet returned no rows. Using demo data.');
        return;
      }

      sheetData = results.data;
      sheetColumns = results.meta.fields || Object.keys(results.data[0]);
      usingDemoData = false;
      setSheetStatus('ok', `Loaded ${sheetData.length} records from sheet`);
      debugLog('✔ Columns detected: ' + sheetColumns.join(', '));

      // Helpful: warn if the configured serial column doesn't exist in the sheet
      if (!sheetColumns.includes(SERIAL_COLUMN)) {
        debugLog('⚠ SERIAL_COLUMN "' + SERIAL_COLUMN + '" not found in sheet headers. ' +
                 'Edit SERIAL_COLUMN in the script to match one of: ' + sheetColumns.join(', '));
      }
    } catch (err) {
      console.error('Sheet load error:', err);
      debugLog('✖ Fetch failed: ' + (err && err.message ? err.message : err));
      showRetryableError();
    }
  }

  function useDemoData(msg) {
    sheetData = DEMO_DATA.slice();
    sheetColumns = Object.keys(DEMO_DATA[0]);
    usingDemoData = true;
    setSheetStatus('warn', msg);
  }

  function setSheetStatus(state, text) {
    els.sheetDot.className = 'config-bar__dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    els.sheetStatusText.textContent = text;
  }

  function showRetryableError() {
    setSheetStatus('err', 'Failed to load sheet');
    els.resultArea.innerHTML = `
      <div class="message message--error">
        <span>⚠️</span>
        <span style="flex:1;">Could not load Google Sheet. Check the published URL and your network.</span>
        <button id="retryLoad" class="btn-primary" style="height:32px;padding:4px 12px;font-size:12px;">Retry</button>
      </div>
    `;
    document.getElementById('retryLoad').addEventListener('click', () => {
      els.resultArea.innerHTML = '';
      loadSheetData();
    });
  }

  // ===============================================================
  // 2. CAMERA ENUMERATION
  // ===============================================================
  async function populateCameras() {
    try {
      const devices = await Html5Qrcode.getCameras();
      els.cameraSelect.innerHTML = '';

      if (!devices || devices.length === 0) {
        els.cameraSelect.innerHTML = '<option value="">— No cameras detected —</option>';
        els.startBtn.disabled = true;
        return;
      }

      devices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.label || `Camera ${i + 1}`;
        els.cameraSelect.appendChild(opt);
      });

      // Prefer back/environment camera on mobile if available
      const back = devices.find(d => /back|rear|environment/i.test(d.label));
      if (back) els.cameraSelect.value = back.id;

      els.startBtn.disabled = false;
    } catch (err) {
      console.warn('Camera enumeration failed:', err);
      // Permissions probably not granted yet — that's okay, we'll request on Start
      els.cameraSelect.innerHTML = '<option value="">— Grant camera permission to list —</option>';
    }
  }

  // ===============================================================
  // 3. START / STOP SCANNING
  // ===============================================================
  async function startScanning() {
    if (isScanning) return;
    clearResult();

    // If we don't yet have cameras enumerated (permission not granted), ask now
    let cameraId = els.cameraSelect.value;
    if (!cameraId) {
      try {
        // Triggers the permission prompt
        await navigator.mediaDevices.getUserMedia({ video: true });
        await populateCameras();
        cameraId = els.cameraSelect.value;
      } catch (err) {
        showPermissionError();
        return;
      }
    }

    if (!cameraId) {
      showPermissionError('No camera available on this device.');
      return;
    }

    html5QrCode = new Html5Qrcode("reader", { verbose: false });

    const config = {
      fps: 10,
      qrbox: (viewfinderWidth, viewfinderHeight) => {
        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        const size = Math.floor(minEdge * 0.7);
        return { width: size, height: size };
      },
      aspectRatio: 1.0,
    };

    try {
      await html5QrCode.start(
        cameraId,
        config,
        onScanSuccess,
        onScanFailure  // silent — fires constantly while no code is in view
      );
      isScanning = true;
      els.readerEmpty.style.display = 'none';
      els.reticle.classList.add('active');
      els.statusPill.classList.add('active');
      els.startBtn.disabled = true;
      els.stopBtn.disabled = false;
      els.cameraSelect.disabled = true;
    } catch (err) {
      console.error('Failed to start scanner:', err);
      showPermissionError(err && err.message ? err.message : 'Could not start the camera.');
    }
  }

  async function stopScanning() {
    if (!isScanning || !html5QrCode) return;
    try {
      await html5QrCode.stop();
      await html5QrCode.clear();
    } catch (err) {
      console.warn('Stop error:', err);
    }
    html5QrCode = null;
    isScanning = false;
    els.readerEmpty.style.display = 'flex';
    els.reticle.classList.remove('active');
    els.statusPill.classList.remove('active');
    els.startBtn.disabled = false;
    els.stopBtn.disabled = true;
    els.cameraSelect.disabled = false;
  }

  // ===============================================================
  // 4. SCAN CALLBACKS + VALIDATION
  // ===============================================================
  function onScanSuccess(decodedText, decodedResult) {
    // Auto-stop unless user toggled continuous mode
    const continuous = els.continuousTgl.checked;
    if (!continuous) {
      stopScanning();
    }
    validateAgainstSheet(decodedText.trim());
  }

  function onScanFailure(err) {
    // Spec requires we silently keep scanning on invalid/unreadable frames.
    // No-op intentionally.
  }

  function normalize(v) {
    return (v == null ? '' : String(v)).trim().toLowerCase();
  }

  function validateAgainstSheet(scannedValue) {
    if (!sheetData || sheetData.length === 0) {
      renderMessage('error', 'No sheet data loaded yet — cannot validate.');
      return;
    }

    const target = normalize(scannedValue);
    const match = sheetData.find(row => normalize(row[SERIAL_COLUMN]) === target);

    if (match) {
      renderMatch(scannedValue, match);
    } else {
      renderNotFound(scannedValue);
    }
  }

  // ===============================================================
  // 5. RESULT RENDERING
  // ===============================================================
  function clearResult() {
    els.resultArea.innerHTML = '';
  }

  function renderMessage(kind, text) {
    const icon = { info: 'ℹ️', success: '✅', error: '⛔', warn: '⚠️' }[kind] || '';
    els.resultArea.innerHTML = `
      <div class="message message--${kind}">
        <span>${icon}</span>
        <span>${text}</span>
      </div>
    `;
  }

  function renderNotFound(scannedValue) {
    els.resultArea.innerHTML = `
      <div class="message message--error">
        <span>⛔</span>
        <span>Record Not Found <span class="scanned-value">${escapeHtml(scannedValue)}</span></span>
      </div>
    `;
  }

  function renderMatch(scannedValue, row) {
    // Build a key/value table of every column for the matched row
    const rows = sheetColumns.map(col => `
      <tr>
        <td class="field-name">${escapeHtml(col)}</td>
        <td class="field-value">${escapeHtml(row[col] ?? '')}</td>
      </tr>
    `).join('');

    els.resultArea.innerHTML = `
      <div class="message message--success">
        <span>✅</span>
        <span>Record Found <span class="scanned-value">${escapeHtml(scannedValue)}</span></span>
      </div>
      <div class="result-table-wrap">
        <table class="result">
          <thead>
            <tr><th>Field</th><th>Value</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function showPermissionError(msg) {
    const text = msg || 'Camera permission was denied. Please allow camera access in your browser settings and try again.';
    els.resultArea.innerHTML = `
      <div class="message message--error">
        <span>📷</span>
        <span>${escapeHtml(text)}</span>
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // Append a line to the on-page debug panel + console
  function debugLog(msg) {
    const el = document.getElementById('debugLog');
    if (el) {
      const time = new Date().toLocaleTimeString();
      el.textContent += `[${time}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }
    console.log('[DEBUG]', msg);
  }

  // ===============================================================
  // 6. WIRE UP EVENTS + INIT
  // ===============================================================
  els.startBtn.addEventListener('click', startScanning);
  els.stopBtn.addEventListener('click', stopScanning);

  // Switching cameras while scanning: stop then restart with new device
  els.cameraSelect.addEventListener('change', async () => {
    if (isScanning) {
      await stopScanning();
      startScanning();
    }
  });

  // Clean up if user navigates away
  window.addEventListener('beforeunload', () => {
    if (isScanning && html5QrCode) {
      html5QrCode.stop().catch(() => {});
    }
  });

  // Boot
  loadSheetData();
  populateCameras();
  </script>
</body>
</html>
